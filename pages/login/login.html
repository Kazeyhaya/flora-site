<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flora · Login</title>
    <link rel="icon" type="image/jpeg" href="../../flora.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="card">
        <div class="card-header">
          <p class="eyebrow">Área do cliente</p>
          <h1>Entrar na Flora</h1>
          <p>Acesse sua conta para continuar navegando pelo catálogo.</p>
        </div>
        <form id="loginForm" class="form">
          <label>
            E-mail
            <input type="email" id="loginEmail" placeholder="seu@email.com" required />
          </label>
          <label>
            Senha
            <input type="password" id="loginPassword" placeholder="Sua senha" required />
          </label>
          <button class="btn btn-primary" type="submit">Entrar</button>
        </form>
        <p id="loginMessage" class="feedback"></p>
        <a class="text-link" href="../home/home.html">Voltar para a home</a>
      </section>
    </main>
    <script src="./login.js"></script>
  </body>
</html>
