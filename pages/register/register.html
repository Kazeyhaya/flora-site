<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flora · Cadastro</title>
    <link rel="icon" type="image/svg+xml" href="../../flora-favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="./register.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav-shell">
        <a class="brand" href="../home/home.html">
          <img class="brand-mark" src="../../flora.jpg" alt="Logo Flora" />
          <span>Flora</span>
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">
          <i class="fas fa-bars"></i>
        </button>
        <nav class="nav-links" id="navLinks" aria-label="Navegação principal">
          <a href="../home/home.html">Home</a>
          <a href="../products/products.html">Produtos</a>
          <a href="../login/login.html" data-auth="guest">Login</a>
          <a href="../account/account.html" data-auth="user" class="is-hidden">Minha Conta</a>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="card">
        <div class="card-header">
          <p class="eyebrow">Área do cliente</p>
          <h1>Criar conta na Flora</h1>
          <p>Cadastre-se para acompanhar pedidos e facilitar suas compras.</p>
        </div>
        <form id="registerForm" class="form">
          <label>
            Nome
            <input type="text" id="registerName" placeholder="Seu nome" required />
          </label>
          <label>
            E-mail
            <input type="email" id="registerEmail" placeholder="seu@email.com" required />
          </label>
          <label>
            Senha
            <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" minlength="6" required />
          </label>
          <div class="actions">
            <button class="btn btn-primary" type="submit">Cadastrar</button>
            <a class="btn btn-secondary" href="../home/home.html">Voltar para home</a>
          </div>
        </form>
        <p class="helper-link">Já tem cadastro? <a href="../login/login.html">Entrar</a></p>
        <p id="registerMessage" class="feedback"></p>
      </section>
    </main>

    <script src="./register.js"></script>
  </body>
</html>
