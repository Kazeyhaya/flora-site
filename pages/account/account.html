<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flora · Minha Conta</title>
    <link rel="icon" type="image/jpeg" href="../../flora.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="./account.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav-shell">
        <a class="brand" href="../home/home.html">
          <img class="brand-mark" src="../../flora.jpg" alt="Logo Flora" />
          <span>Flora</span>
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">
          <i class="fas fa-bars"></i>
        </button>
        <nav class="nav-links" id="navLinks" aria-label="Navegação principal">
          <a href="../home/home.html">Home</a>
          <a href="../products/products.html">Produtos</a>
          <a href="../login/login.html" data-auth="guest">Login</a>
          <a href="./account.html" class="active" data-auth="user">Minha Conta</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <section class="card">
        <h1>Minha Conta</h1>
        <p class="subtitle">Informações da sua conta e histórico de compras.</p>
        <div class="info-grid">
          <article class="info-item">
            <h2>Nome</h2>
            <p id="accountName">-</p>
          </article>
          <article class="info-item">
            <h2>E-mail</h2>
            <p id="accountEmail">-</p>
          </article>
        </div>
        <article class="history">
          <h2>Histórico de compras</h2>
          <ul id="purchaseHistory">
            <li>Nenhuma compra registrada ainda.</li>
          </ul>
        </article>
        <div class="actions">
          <a class="btn btn-secondary" href="../products/products.html">Continuar comprando</a>
          <button id="logoutButton" class="btn btn-primary" type="button">Sair da conta</button>
        </div>
      </section>
    </main>

    <script src="./account.js"></script>
  </body>
</html>
